server {
    listen 80;
    server_name sultraxai.com www.sultraxai.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name sultraxai.com www.sultraxai.com;

    ssl_certificate     /etc/letsencrypt/live/sultraxai.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sultraxai.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Static frontend files served directly by nginx (fast)
    root /root/sultraxai/sultraxai-frontend/dist;
    index index.html;

    # WebSocket upgrade
    location /ws/ {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_read_timeout 86400;
    }

    # API requests to FastAPI
    location /api/ {
        proxy_pass         http://127.0.0.1:8000;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Frontend assets with long cache
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # React SPA — all other routes serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
