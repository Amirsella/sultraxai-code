<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Circle arc right side (gap at top and bottom where sword passes through) -->
  <path d="M 59.8,13.3 A 38,38 0 0 1 59.8,86.7"
        fill="none" stroke="#dc2626" stroke-width="4.5" stroke-linecap="round"/>
  <!-- Circle arc left side -->
  <path d="M 40.2,86.7 A 38,38 0 0 1 40.2,13.3"
        fill="none" stroke="#dc2626" stroke-width="4.5" stroke-linecap="round"/>

  <!-- Sword pommel (diamond shape) -->
  <polygon points="50,4 55.5,10 50,16 44.5,10" fill="#dc2626"/>

  <!-- Sword grip -->
  <rect x="47.5" y="16" width="5" height="13" fill="#dc2626"/>

  <!-- Crossguard -->
  <polygon points="33,28 67,28 65,33 35,33" fill="#dc2626"/>

  <!-- Sword blade tapering to a point -->
  <polygon points="47.5,33 52.5,33 51,83 50,90 49,83" fill="#dc2626"/>

  <!-- Bar chart left inside circle -->
  <rect x="20" y="55" width="4.5" height="14" fill="#dc2626"/>
  <rect x="26" y="47" width="4.5" height="22" fill="#dc2626"/>
  <rect x="32" y="39" width="4.5" height="30" fill="#dc2626"/>

  <!-- Dots below bars -->
  <circle cx="22" cy="73" r="2" fill="#dc2626"/>
  <circle cx="28" cy="73" r="2" fill="#dc2626"/>
  <circle cx="34" cy="73" r="2" fill="#dc2626"/>

  <!-- Line chart right inside circle -->
  <polyline points="62,58 68,49 75,41"
            fill="none" stroke="#dc2626" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="62" cy="58" r="2.5" fill="#dc2626"/>
  <circle cx="68" cy="49" r="2.5" fill="#dc2626"/>
  <circle cx="75" cy="41" r="2.5" fill="#dc2626"/>

  <!-- Grid dots right bottom -->
  <circle cx="62" cy="65" r="1.8" fill="#dc2626" opacity="0.6"/>
  <circle cx="68" cy="65" r="1.8" fill="#dc2626" opacity="0.6"/>
  <circle cx="74" cy="65" r="1.8" fill="#dc2626" opacity="0.6"/>
  <circle cx="62" cy="71" r="1.8" fill="#dc2626" opacity="0.6"/>
  <circle cx="68" cy="71" r="1.8" fill="#dc2626" opacity="0.6"/>
  <circle cx="74" cy="71" r="1.8" fill="#dc2626" opacity="0.6"/>
</svg>
